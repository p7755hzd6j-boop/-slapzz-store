<style>
body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:white;
direction:rtl;

/* NAV /
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
position:sticky;
top:0;
}

.nav h1{
color:#00ffd5;
}

/ HERO /
.hero{
text-align:center;
padding:60px 20px;
background:linear-gradient(#000000cc,#000000ee),
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3');
background-size:cover;
}

.hero h2{
color:#00ffd5;
font-size:40px;
}

/ GRID /
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:10px;
border-radius:15px;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#00ffd5;
}

button{
background:#00ffd5;
border:none;
padding:8px;
margin-top:5px;
cursor:pointer;
font-weight:bold;
}

/ CART /
.cart{
position:fixed;
bottom:20px;
left:20px;
background:#00ffd5;
color:black;
padding:10px 15px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

.lang{
cursor:pointer;
color:#00ffd5;
}
</style>
</head>

products.forEach(p=>{

function addToCart(item){
cart.push(item);
