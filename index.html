<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLAPZZ STORE</title>
<style>
body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:white;
direction:rtl;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
position:sticky;
top:0;
}

.nav h1{
color:#00ffd5;
font-size:20px;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px;
background:linear-gradient(#000000cc,#000000ee),
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3');
background-size:cover;
}

.hero h2{
color:#00ffd5;
font-size:40px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:10px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#00ffd5;
}

/* CART */
.cart{
position:fixed;
bottom:20px;
left:20px;
background:#00ffd5;
color:black;
padding:10px 15px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>
<body>
<div class="nav">
<h1>SLAPZZ ⚡</h1>
<span>Store</span>
</div>
<div class="hero">
<h2>أفضل ستيكرات 🔥</h2>
<p>اضغط على أي منتج للإضافة للسلة</p>
</div>
<!-- PRODUCTS -->
<div class="grid" id="grid"></div>
<script>

let cart = [];

/* 👇 هنا تحط كل الصور بتاعتك */
let products = [

{ name:"Sticker 1", price:12, img:"sticker1.png" },
{ name:"Sticker 2", price:12, img:"sticker2.png" },
{ name:"Sticker 3", price:12, img:"sticker3.png" },

// كمل هنا لحد 140 صورة
];

function loadProducts(){
let grid = document.getElementById("grid");

products.forEach(p=>{
let div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price} EGP</p>
<button onclick="addToCart('${p.name}')">إضافة</button>
`;

grid.appendChild(div);
});
}

function addToCart(name){
cart.push(name);
alert("تمت الإضافة 🛒");
}

function sendOrder(){
let msg = "طلب جديد:%0A" + cart.join("%0A");
window.open("https://wa.me/201000000000?text=" + msg);
}

loadProducts();

</script>
</body>
</html>
