<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLAPZZ STICKERS</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#0d0d0d;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop');
background-size:cover;
background-position:center;
}

h1{
font-size:60px;
color:#00ffd5;
letter-spacing:3px;
margin-bottom:15px;
text-shadow:0 0 20px #00ffd5;
}

p{
font-size:22px;
color:#ddd;
margin-bottom:30px;
}

.btn{
padding:15px 35px;
background:#00ffd5;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:50px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

.coming{
margin-top:25px;
font-size:18px;
color:#aaa;
}

</style>
</head>
<body>
<section class="hero">
<h1>SLAPZZ STICKERS ⚡</h1>
<p>Premium Street Style Stickers</p>
<div class="coming">
New Drops • Custom Designs • Urban Style
</div>
</section>
</body>
</html>
