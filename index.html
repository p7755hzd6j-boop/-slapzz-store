<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLAPZZ Stickers</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #1a1a1a;
            --primary: #7000ff; /* Neon Purple */
            --accent: #00f3ff; /* Cyan */
            --text: #ffffff;
            --text-muted: #aaaaaa;
            --danger: #ff0055;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text);
            transition: 0.3s;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.95);
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        
        .controls { display: flex; gap: 15px; align-items: center; }
        
        button {
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 25px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--text);
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: var(--primary); box-shadow: 0 0 15px var(--primary); }

        .lang-btn { font-size: 0.9rem; padding: 5px 10px; }

        /* --- Hero --- */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: radial-gradient(circle at center, #1f1f1f 0%, #050505 100%);
        }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; }
        .hero p { color: var(--accent); font-size: 1.2rem; }

        /* --- Product Grid --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding-bottom: 100px; /* Space for cart */
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        .card-img {
            width: 100%;
            height: 180px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
        }

        .card-info { padding: 15px; }
        .card-title { font-size: 1rem; margin-bottom: 5px; }
        .card-desc { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .price { color: var(--accent); font-weight: bold; font-size: 1.1rem; }

        .add-btn {
            border: none;
            background: var(--primary);
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
        }
        .add-btn:hover { background: var(--accent); color: black; }

        /* --- Cart Sidebar --- */
        #cart-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 200;
        }

        #cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: #111;
            border-left: 1px solid #333;
            transition: 0.3s;
            z-index: 201;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        #cart-sidebar.open { right: 0; }
        #cart-overlay.active { opacity: 1; pointer-events: all; }

        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .close-cart { background: none; border: none; color: var(--danger); font-size: 1.5rem; }

        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .item-name { font-size: 0.9rem; }
        .item-price { color: var(--accent); font-size: 0.9rem; }
        .remove-item { color: var(--danger); cursor: pointer; font-size: 0.8rem; text-decoration: underline; }

        .cart-summary { margin-top: auto; padding-top: 20px; border-top: 2px solid var(--primary); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1.1rem; }
        .total-row { font-weight: bold; font-size: 1.4rem; color: var(--accent); }
        
        /* Checkout Form */
        .checkout-form { display: none; margin-top: 20px; }
        .checkout-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }
        .submit-order { width: 100%; background: var(--primary); border: none; font-size: 1.1rem; }

        /* --- Admin Panel (Hidden) --- */
        #admin-panel {
            display: none; /* Toggled via JS */
            margin-top: 50px;
            padding: 20px;
            background: #111;
            border: 1px solid var(--primary);
        }
        
        .order-card {
            border: 1px solid #444;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            background: #333;
            cursor: pointer;
        }
        .status-processing { background: orange; color: black; }
        .status-shipped { background: green; color: white; }

        /* Utilities */
        [dir="rtl"] .add-btn { float: left; }
